version: 1.0.{build}
build:
  verbosity: minimal

environment:
  matrix:
  - APPVEYOR_BUILD_WORKER_IMAGE: Ubuntu
    CMAKE_GENERATOR: Unix Makefiles

  - APPVEYOR_BUILD_WORKER_IMAGE: Visual Studio 2022
    CMAKE_GENERATOR: Visual Studio 17 2022
    CMAKE_PLATFORM: x64

  - APPVEYOR_BUILD_WORKER_IMAGE: Visual Studio 2022
    CMAKE_GENERATOR: Visual Studio 17 2022
    CMAKE_PLATFORM: Win32

before_build:
  - cmd: git submodule update --init --recursive
  - sh: git submodule update --init --recursive

build_script:
  - cmd: mkdir build
  - cmd: cd build
  - cmd: cmake .. -G "%CMAKE_GENERATOR%" -A "%CMAKE_PLATFORM%" -DCMAKE_BUILD_TYPE=Release
  - cmd: cmake --build . --config Release
  - cmd: .\\out\\Release\\bin\\pattern-bench.exe --size=0x800000 --tests=512 --full

  - sh: mkdir build
  - sh: cd build
  - sh: cmake .. -G "$CMAKE_GENERATOR" -DCMAKE_BUILD_TYPE=Release
  - sh: cmake --build . --config Release
  - sh: ./out/Release/bin/pattern-bench --size=0x800000 --tests=512 --full
